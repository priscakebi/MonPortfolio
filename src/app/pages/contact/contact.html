<section id="contact" class="contact">

  <h2>📬 Me contacter</h2>
  <p class="subtitle">Une question ? Un projet ? N'hésite pas 👇</p>

  <div class="container">

    <!-- INFOS -->
    <div class="info">
      <h3>Contact</h3>

      <div class="item">
        <span>📧</span>
        <p>priscakebi00@gmail.com</p>
      </div>

      <div class="item">
        <span>📱</span>
        <p>07 53 52 17 96</p>
      </div>

      <div class="item">
        <span>📍</span>
        <p>France</p>
      </div>

      <div class="socials">
        <a href="#">GitHub</a>
        <a href="#">LinkedIn</a>
      </div>
    </div>

    <!-- FORM -->
    <form class="form" (ngSubmit)="send()">

      <div class="row">
        <input type="text" name="name" [(ngModel)]="form.name" placeholder="Nom" required>
        <input type="email" name="email" [(ngModel)]="form.email" placeholder="Email" required>
      </div>

      <textarea name="message" [(ngModel)]="form.message" placeholder="Ton message..." required></textarea>

      <button type="submit">Envoyer</button>

    </form>

  </div>

</section>
